name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Chọn hành động'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

      environment:
        description: 'Môi trường deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

# ✅ Bắt buộc phải có để dùng OIDC
permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      # ✅ AssumeRole — không cần Access Key
      - name: Configure AWS Credentials via AssumeRole
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-terraform
          aws-region: ap-northeast-1

      # Verify role đã được assume thành công
      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var="environment=${{ github.event.inputs.environment }}"

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -var="environment=${{ github.event.inputs.environment }}"

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -var="environment=${{ github.event.inputs.environment }}"